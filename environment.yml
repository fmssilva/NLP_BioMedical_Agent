name: nlp-labs
channels:
  - pytorch
  - nvidia
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
    - opensearch-py
    - sentence-transformers
    - transformers
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch
    - torchvision
    - torchaudio
    - tqdm
    - numpy
    - matplotlib
    - scikit-learn
    - pyyaml
    - openai
    - bertviz
    - pandas
    - seaborn
    - setuptools
    - wheel
    - spacy
    - scispacy
    - https://s3-us-west-2.amazonaws.com/ai2-s2-scispacy/releases/v0.5.4/en_core_sci_sm-0.5.4.tar.gz
    - nltk
    - ipywidgets
    - python-dotenv